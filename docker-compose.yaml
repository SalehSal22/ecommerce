services:
  app1:
    build:
      context: .
    volumes:
      - ./:/app
    command: php artisan octane:start --server=frankenphp --host=0.0.0.0 --port=8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
  app2:
    build:
      context: .
    volumes:
      - ./:/app
    command: php artisan octane:start --server=frankenphp --host=0.0.0.0 --port=8000
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    image: nginx:alpine
    ports:
      - "8001:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./public:/app/public:ro
    depends_on:
      - app1
      - app2
